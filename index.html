<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>TODO リスト</h1>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="タスクを入力..." maxlength="100">
      <input type="date" id="due-input" title="完了予定日（任意）">
      <button id="add-btn">追加</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="completed">完了済み</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="footer">
      <span id="remaining">0 件の未完了タスク</span>
      <button id="clear-btn">完了済みを削除</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
