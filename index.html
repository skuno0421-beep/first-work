<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ばかーポイント</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ばかーポイント</h1>

    <div class="point-display">
      <span id="point-value">---</span>
      <span class="point-unit">ポイント</span>
    </div>

    <div id="online-badge" class="online-badge hidden">
      <span class="dot"></span>みんなで貯めてる！
    </div>

    <button id="baka-btn">
      <span class="btn-emoji">🤪</span>
      <span class="btn-text">ばか！</span>
    </button>

    <div id="floats-container"></div>

    <div class="actions">
      <button id="reset-btn">リセット</button>
      <button id="forgive-btn">❤️ 許してあげる！</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
